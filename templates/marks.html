{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 p-4">
    <h3 class="text-primary mb-4"><i class="fas fa-clipboard-list"></i> Academic Performance Report</h3>
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Student Name</th>
                <th>Department</th>
                <th>Course Name</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            {% for m in marks %}
            <tr>
                <td>{{ m.STU_NAME }}</td>
                <td><span class="badge bg-info text-dark">{{ m.DEPT_NAME }}</span></td>
                <td>{{ m.CORS_NAME }}</td>
                <td>{{ m.CORS_MARKS }}</td>
                <td><span class="badge bg-success">{{ m.CORS_GRADE }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
