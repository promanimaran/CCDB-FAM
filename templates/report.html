{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <h2 class="mb-4">Academic Records</h2>
    <table class="table table-hover text-white">
        <thead>
            <tr><th>Student Name</th><th>Course</th><th>Marks</th><th>Grade</th></tr>
        </thead>
        <tbody>
            {% for r in report %}
            <tr>
                <td>{{ r.STU_NAME }}</td>
                <td>{{ r.COURSE_NAME }}</td>
                <td>{{ r.CORS_MARKS }}</td>
                <td><strong>{{ r.CORS_GRADE }}</strong></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
