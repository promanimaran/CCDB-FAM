<!DOCTYPE html>
<html>
<head><title>College Database</title></head>
<body>
    <h2>Centralized College Student Records</h2>
    
    <form action="/add" method="post">
        <input type="text" name="sid" placeholder="ID" required>
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="dept" placeholder="Dept ID" required>
        <button type="submit">Add Student</button>
    </form>

    <table border="1" style="margin-top: 20px;">
        <tr><th>ID</th><th>Name</th><th>Dept</th><th>Action</th></tr>
        {% for s in students %}
        <tr>
            <td>{{ s.STUDENT_ID }}</td>
            <td>{{ s.NAME }}</td>
            <td>{{ s.DEPT_ID }}</td>
            <td>
                <a href="/delete/{{ s.STUDENT_ID }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
