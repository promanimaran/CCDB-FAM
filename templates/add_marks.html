<!DOCTYPE html>
<html lang="en">
<head>
    <title>Academic Entry - Engineering System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-lg border-0 mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Enter Course Marks</h4>
            </div>
            <div class="card-body p-4">
                <form action="/add_marks" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Select Student</label>
                        <select name="stu_id" class="form-select" required>
                            {% for s in students %}
                            <option value="{{ s.STU_ID }}">{{ s.STU_NAME }} (ID: {{ s.STU_ID }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Course</label>
                        <select name="cors_id" class="form-select" required>
                            {% for c in courses %}
                            <option value="{{ c.CORS_ID }}">{{ c.CORS_NAME }} (Credits: {{ c.CREDITS }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row mb-4">
                        <div class="col">
                            <label class="form-label">Marks (0-100)</label>
                            <input type="number" name="marks" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Grade</label>
                            <input type="text" name="grade" class="form-control" placeholder="e.g. A" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Record Academic Performance</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
